<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DGfB 2026 Evaluation</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 10px; line-height: 1.4; }
        .card { background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; overflow: hidden; }
        .banner { width: 100%; height: auto; display: block; }
        .content { padding: 20px; }
        h2 { margin: 10px 0 5px; color: #1a1a1a; text-align: center; font-size: 1.3rem; }
        .subtitle { color: #666; font-size: 0.85rem; text-align: center; margin-bottom: 20px; }
        .status-badge { display: block; text-align: center; font-size: 12px; margin: 10px 0; padding: 8px; border-radius: 8px; background: #dcfce7; color: #166534; font-weight: bold; }
        .section-title { background: #e2e8f0; padding: 8px; border-radius: 5px; margin: 20px 0 10px; font-weight: bold; font-size: 0.9rem; color: #1e293b; }
        label { display: block; margin-top: 12px; font-weight: 600; font-size: 0.85rem; color: #374151; }
        select, textarea, button { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 15px; box-sizing: border-box; }
        .rating-item { border-bottom: 1px solid #f0f0f0; padding-bottom: 10px; }
        button { background: #005596; color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 25px; padding: 15px; transition: 0.3s; }
        button:disabled { background: #9ca3af; cursor: not-allowed; opacity: 0.6; }
        .hidden { display: none; }
        .success { text-align: center; padding: 40px 20px; }
        #draftNote { background: #fef3c7; color: #92400e; padding: 8px; font-size: 12px; border-radius: 5px; text-align: center; display: none; margin-bottom: 15px; border: 1px solid #f59e0b; }
    </style>
</head>
<body>

<div class="card" id="formBox">
    <img src="https://biomechanik-kongress.de/wp-content/uploads/sites/26/2025/04/DGfB-banner-final-version.png" alt="DGfB Banner" class="banner">
    
    <div class="content">
        <h2>Workshop Evaluation</h2>
        <div id="draftNote">Vorgang fortgesetzt: Gespeicherter Entwurf geladen.</div>
        <p class="subtitle">Ihr Feedback ist anonym. Fortschritt wird lokal gespeichert.</p>
        
        <form id="evalForm">
            <label>Besuchter Workshop</label>
            <select id="workshop" required onchange="updateUIForWorkshop(this.value)">
                <option value="">Bitte wählen...</option>
                <option value="Antrag">Mein erster Antrag: von der Idee zum Forschungsvorhaben.</option>
                <option value="Forschungsdaten">Zwischen Theorie und Praxis: Forschungsdaten im echten Alltag.</option>
                <option value="Netzwerken">Netzwerken leicht gemacht: Wie baue ich mir mein eigenes Netzwerk?</option>
                <option value="Klinische Forschung">Klinische Forschung – wozu das Ganze?</option>
                <option value="Produktentwickler">Produktentwickler – was machen die eigentlich genau?</option>
                <option value="Mentor">Meet the Mentor</option>
            </select>
            <div id="validatedMsg" class="status-badge" style="display:none">✓ Sie haben diesen Workshop bereits evaluiert!</div>

            <div id="questionsArea">
                <div class="section-title">1. Inhalte (1=Nein, 5=Voll zu)</div>
                <div class="rating-item"><label>Inhalte waren verständlich erklärt</label><select id="q1" required><option value="">Punkte...</option><option value="5">5 - Voll zu</option><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1 - Nein</option></select></div>
                <div class="rating-item"><label>Die Themen waren für mich relevant</label><select id="q2" required><option value="">Punkte...</option><option value="5">5</option><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option></select></div>
                <div class="rating-item"><label>Der Workshop hatte einen klaren roten Faden</label><select id="q3" required><option value="">Punkte...</option><option value="5">5</option><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option></select></div>
                <div class="rating-item"><label>Die Inhalte waren praxisnah und relevant</label><select id="q4" required><option value="">Punkte...</option><option value="5">5</option><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option></select></div>
                <div class="rating-item"><label>Ich habe neue Erkenntnisse oder Wissen gewonnen</label><select id="q5" required><option value="">Punkte...</option><option value="5">5</option><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option></select></div>
                <div class="rating-item"><label>Die Zeitplanung war angemessen</label><select id="q6" required><option value="">Punkte...</option><option value="5">5</option><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option></select></div>
                <div class="rating-item"><label>Der Ablauf des Workshops war gut strukturiert</label><select id="q7" required><option value="">Punkte...</option><option value="5">5</option><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option></select></div>
                <div class="rating-item"><label>Der Raum / die technische Ausstattung waren geeignet</label><select id="q8" required><option value="">Punkte...</option><option value="5">5</option><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option></select></div>
                <div class="rating-item"><label>Die Dauer des Workshops war passend</label><select id="q9" required><option value="">Punkte...</option><option value="5">5</option><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option></select></div>
                <div class="rating-item"><label>Ich kann die Inhalte in meinem Alltag anwenden</label><select id="q10" required><option value="">Punkte...</option><option value="5">5</option><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option></select></div>

                <div class="section-title">2. Offene Fragen</div>
                <label>Was hat Ihnen am besten gefallen?</label><textarea id="o1" rows="2"></textarea>
                <label>Was hat Ihnen weniger gut gefallen?</label><textarea id="o2" rows="2"></textarea>
                <label>Zukunftsthemen?</label><textarea id="o3" rows="2"></textarea>
                <label>Weitere Anmerkungen?</label><textarea id="o4" rows="2"></textarea>
            </div>

            <button type="submit" id="submitBtn">Evaluation anonym absenden</button>
        </form>
    </div>
</div>

<div class="card hidden success" id="successBox">
    <div style="font-size: 50px; color: #10b981; margin-bottom: 20px; text-align:center">✓</div>
    <h2>Vielen Dank!</h2>
    <p style="text-align:center">Ihre Bewertung wurde übermittelt.</p>
    <button onclick="location.reload()" style="background: #64748b;">Nächsten Workshop bewerten</button>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzXC2Sl6rQJ8CqbNnc_JmWRJhJDu3-h4l8yU2qEbsjIPMzBMmL73hHeLhm_FduFlT4/exec";
    const STORAGE_KEY = "dgfb_eval_draft";
    const DONE_KEY = "dgfb_validated_workshops";

    function updateUIForWorkshop(selectedWs) {
        const validated = JSON.parse(localStorage.getItem(DONE_KEY) || "[]");
        const msg = document.getElementById('validatedMsg');
        const submitBtn = document.getElementById('submitBtn');
        const isDone = validated.includes(selectedWs);
        
        msg.style.display = (selectedWs && isDone) ? "block" : "none";
        submitBtn.disabled = isDone;
        if(isDone) submitBtn.innerText = "Bereits evaluiert";
        else submitBtn.innerText = "Evaluation anonym absenden";
    }

    function refreshDropdownLabels() {
        const validated = JSON.parse(localStorage.getItem(DONE_KEY) || "[]");
        const select = document.getElementById('workshop');
        Array.from(select.options).forEach(opt => {
            if (validated.includes(opt.value) && !opt.text.startsWith("✓")) {
                opt.text = "✓ " + opt.text;
            }
        });
    }

    window.onload = () => {
        refreshDropdownLabels();
        const inputs = document.querySelectorAll('select, textarea');
        
        const draft = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (draft) {
            Object.keys(draft).forEach(id => {
                const el = document.getElementById(id);
                if(el) el.value = draft[id];
            });
            document.getElementById('draftNote').style.display = "block";
            updateUIForWorkshop(document.getElementById('workshop').value);
        }
        
        inputs.forEach(el => {
            el.addEventListener('input', () => {
                const currentDraft = {};
                inputs.forEach(i => currentDraft[i.id] = i.value);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(currentDraft));
            });
        });

        document.getElementById('evalForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "Wird gesendet...";

            const data = {};
            inputs.forEach(i => data[i.id] = i.value);

            fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(data)
            }).then(() => {
                const validated = JSON.parse(localStorage.getItem(DONE_KEY) || "[]");
                if(!validated.includes(data.workshop)) validated.push(data.workshop);
                localStorage.setItem(DONE_KEY, JSON.stringify(validated));
                localStorage.removeItem(STORAGE_KEY);
                
                document.getElementById('formBox').classList.add('hidden');
                document.getElementById('successBox').classList.remove('hidden');
            }).catch(() => {
                alert("Fehler beim Senden. Bitte prüfen Sie Ihre Verbindung.");
                btn.disabled = false;
                btn.innerText = "Evaluation anonym absenden";
            });
        });
    };
</script>
</body>
</html>
