<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DGfB 2026 Evaluation</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 10px; line-height: 1.4; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { margin: 0; color: #1a1a1a; text-align: center; font-size: 1.3rem; }
        .subtitle { color: #666; font-size: 0.85rem; text-align: center; margin-bottom: 20px; }
        .section-title { background: #e2e8f0; padding: 8px; border-radius: 5px; margin: 20px 0 10px; font-weight: bold; font-size: 0.9rem; }
        label { display: block; margin-top: 12px; font-weight: 600; font-size: 0.85rem; color: #374151; }
        select, textarea, button { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 15px; box-sizing: border-box; }
        .rating-grid { display: flex; flex-direction: column; gap: 10px; }
        .rating-item { border-bottom: 1px solid #f0f0f0; padding-bottom: 10px; }
        button { background: #2563eb; color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 25px; padding: 15px; }
        button:disabled { background: #9ca3af; }
        .hidden { display: none; }
        .success { text-align: center; padding: 30px; }
    </style>
</head>
<body>

<div class="card" id="formBox">
    <h2>DGfB 2026 Evaluation</h2>
    <p class="subtitle">Anonyme Bewertung der Workshops</p>
    
    <form id="evalForm">
        <label>Besuchter Workshop</label>
        <select id="workshop" required>
            <option value="">Bitte wählen...</option>
            <option value="Antrag">Mein erster Antrag: von der Idee zum Forschungsvorhaben.</option>
            <option value="Forschungsdaten">Zwischen Theorie und Praxis: Forschungsdaten im echten Alltag.</option>
            <option value="Netzwerken">Netzwerken leicht gemacht: Wie baue ich mir mein eigenes Netzwerk?</option>
            <option value="Klinische Forschung">Klinische Forschung – wozu das Ganze?</option>
            <option value="Produktentwickler">Produktentwickler – was machen die eigentlich genau?</option>
            <option value="Mentor">Meet the Mentor – Prof. Dr. Christof Hurschler</option>
        </select>

        <div class="section-title">1. Fragen zum Inhalt (1 = Nein, 5 = Voll zu)</div>
        <div class="rating-grid">
            <div class="rating-item"><label>Inhalte waren verständlich erklärt</label>
                <select id="q1" required><option value="">Punkte...</option><option value="5">5 - Stimme voll zu</option><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1 - Stimme gar nicht zu</option></select></div>
            <div class="rating-item"><label>Themen waren für mich relevant</label>
                <select id="q2" required><option value="">Punkte...</option><option value="5">5</option><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option></select></div>
            <div class="rating-item"><label>Klarer roter Faden vorhanden</label>
                <select id="q3" required><option value="">Punkte...</option><option value="5">5</option><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option></select></div>
            <div class="rating-item"><label>Inhalte waren praxisnah</label>
                <select id="q4" required><option value="">Punkte...</option><option value="5">5</option><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option></select></div>
            <div class="rating-item"><label>Neue Erkenntnisse gewonnen</label>
                <select id="q5" required><option value="">Punkte...</option><option value="5">5</option><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option></select></div>
            <div class="rating-item"><label>Zeitplanung war angemessen</label>
                <select id="q6" required><option value="">Punkte...</option><option value="5">5</option><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option></select></div>
            <div class="rating-item"><label>Ablauf war gut strukturiert</label>
                <select id="q7" required><option value="">Punkte...</option><option value="5">5</option><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option></select></div>
            <div class="rating-item"><label>Raum / Technik waren geeignet</label>
                <select id="q8" required><option value="">Punkte...</option><option value="5">5</option><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option></select></div>
            <div class="rating-item"><label>Dauer des Workshops war passend</label>
                <select id="q9" required><option value="">Punkte...</option><option value="5">5</option><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option></select></div>
            <div class="rating-item"><label>Anwendbarkeit im Alltag/Beruf</label>
                <select id="q10" required><option value="">Punkte...</option><option value="5">5</option><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option></select></div>
        </div>

        <div class="section-title">2. Offenes Feedback</div>
        <label>Was hat Ihnen am besten gefallen?</label>
        <textarea id="o1" rows="2"></textarea>
        
        <label>Was könnte verbessert werden?</label>
        <textarea id="o2" rows="2"></textarea>
        
        <label>Themen für die Zukunft?</label>
        <textarea id="o3" rows="2"></textarea>

        <label>Weitere Anmerkungen</label>
        <textarea id="o4" rows="2"></textarea>

        <button type="submit" id="submitBtn">Evaluation absenden</button>
    </form>
</div>

<div class="card hidden success" id="successBox">
    <h2 style="color: #10b981;">Vielen Dank!</h2>
    <p>Ihr Feedback wurde anonym gespeichert.</p>
    <button onclick="location.reload()">Weiteres Feedback</button>
</div>

<script>
    const WEB_APP_URL = "DEINE_WEB_APP_URL_HIER_EINSETZEN";

    document.getElementById('evalForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "Wird gesendet...";

        const data = {
            workshop: document.getElementById('workshop').value,
            q1: document.getElementById('q1').value, q2: document.getElementById('q2').value,
            q3: document.getElementById('q3').value, q4: document.getElementById('q4').value,
            q5: document.getElementById('q5').value, q6: document.getElementById('q6').value,
            q7: document.getElementById('q7').value, q8: document.getElementById('q8').value,
            q9: document.getElementById('q9').value, q10: document.getElementById('q10').value,
            o1: document.getElementById('o1').value, o2: document.getElementById('o2').value,
            o3: document.getElementById('o3').value, o4: document.getElementById('o4').value
        };

        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(data)
        }).then(() => {
            document.getElementById('formBox').classList.add('hidden');
            document.getElementById('successBox').classList.remove('hidden');
        }).catch(err => {
            alert("Fehler beim Senden. Bitte Internetverbindung prüfen.");
            btn.disabled = false;
        });
    });
</script>
</body>
</html>
